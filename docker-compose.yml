version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: onit_blog_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sua_senha
      POSTGRES_DB: onit_blog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - onit_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: onit_blog_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - onit_network

volumes:
  postgres_data:

networks:
  onit_network:
    driver: bridge